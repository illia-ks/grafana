name: Supernova Analyze

on:
  push:
    branches: [ main ]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Grafana source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Enable Yarn (Grafana monorepo requirement)
      - name: Enable Corepack (Yarn)
        run: |
          corepack enable
          corepack prepare yarn@stable --activate

      # 3. Install dependencies (Grafana uses workspaces)
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # 4. Run Supernova CLI analyze
      - name: Run Supernova analyze
        env:
          SUPERNOVA_API_KEY: ${{ secrets.SUPERNOVA_API_KEY }}
          SUPERNOVA_DESIGN_SYSTEM_ID: ${{ secrets.SUPERNOVA_DESIGN_SYSTEM_ID }}
        run: |
          npx supernova analyze \
            --apiKey="$SUPERNOVA_API_KEY" \
            --designSystemId="$SUPERNOVA_DESIGN_SYSTEM_ID"
