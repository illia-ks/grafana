name: Supernova Analyze

on:
  push:
    branches: [ main ]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Grafana source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Enable Corepack 
      - name: Enable Corepack
        run: corepack enable

      # 3. Run Supernova CLI in isolated environment
      - name: Run Supernova analyze
        env:
          SUPERNOVA_API_KEY: ${{ secrets.SUPERNOVA_API_KEY }}
        run: |
          mkdir -p /tmp/supernova-run
          cd /tmp/supernova-run

          npm init -y
          npm install @supernovaio/cli

          # copy Grafana code into context folder
          cp -R "$GITHUB_WORKSPACE" ./source

          cd source

          npx supernova code analyze \
            --designSystemId="$SUPERNOVA_DESIGN_SYSTEM_ID"
