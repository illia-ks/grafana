name: Supernova Analyze

on:
  push:
    branches: [ main ]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Grafana source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Enable Corepack 
      - name: Enable Corepack
        run: corepack enable

      # 3. Run Supernova in isolated environment
      - name: Run Supernova analyze (isolated)
        env:
          SUPERNOVA_API_KEY: ${{ secrets.SUPERNOVA_API_KEY }}
          SUPERNOVA_DESIGN_SYSTEM_ID: ${{ secrets.SUPERNOVA_DESIGN_SYSTEM_ID }}
        run: |
          mkdir -p /tmp/supernova-run
          cd /tmp/supernova-run

          npm init -y
          npm install @supernovaio/cli

          npx supernova code analyze \
            --apiKey="$SUPERNOVA_API_KEY" \
            --designSystemId="$SUPERNOVA_DESIGN_SYSTEM_ID" \
            --path="${GITHUB_WORKSPACE}"
