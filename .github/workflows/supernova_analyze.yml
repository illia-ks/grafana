name: Supernova Code Analyze

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 5'

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Grafana source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Supernova CLI
      - name: Install Supernova CLI
        run: npm install -g @supernovaio/cli

      # 3. Run analysis
      - name: Run Supernova analyze
        env:
          SUPERNOVA_TOKEN: ${{ secrets.SUPERNOVA_API_KEY }}
        run: |
          supernova code analyze \
            -d "${{ secrets.SUPERNOVA_DESIGN_SYSTEM_ID }}"
